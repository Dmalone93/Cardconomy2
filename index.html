<style>
  :root {
    --bg: #eef0f3;
    --surface: #ffffff;
    --surface-2: #ffffff;
    --ink: #16181d;
    --ink-2: #3a3d44;
    --muted: #71757e;
    --faint: #a4a8b0;
    --line: #e7e8ec;
    --line-2: #eef0f3;
    --fill: #0f172a;
    --glass: rgba(255,255,255,0.9);
    --ios-sb: #0f172a;
    --accent: #059669;
    --accent-press: #047857;
    --accent-wash: #ecfdf5;
    --accent-ink: #ffffff;
    --up: oklch(0.58 0.13 152);
    --up-wash: oklch(0.95 0.05 152);
    --down: oklch(0.6 0.19 24);
    --gold: #d97706;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
    --heading: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'SF Mono', monospace;
    --wordmark: 'Reglo', 'Space Grotesk', sans-serif;
    /* Radix-style scales */
    --radius-1: 4px; --radius-2: 4px; --radius-3: 4px; --radius-4: 4px; --radius-5: 4px;
    --shadow-1: 0 1px 2px rgba(20,24,40,0.06), 0 1px 3px rgba(20,24,40,0.05);
    --shadow-2: 0 2px 8px rgba(20,24,40,0.07), 0 4px 14px rgba(20,24,40,0.06);
    --shadow-3: 0 8px 26px rgba(20,24,40,0.13);
    --focus-ring: 0 0 0 3px color-mix(in oklch, var(--accent) 35%, transparent);
  }
  @font-face { font-family: 'Reglo'; src: url('brand/Reglo-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: swap; }
  /* Radix-grade keyboard focus — visible only for keyboard users */
  :focus { outline: none; }
  button:focus-visible, a:focus-visible, input:focus-visible, [role="button"]:focus-visible, select:focus-visible {
    outline: none; box-shadow: var(--focus-ring); border-radius: 8px;
  }
  button, [role="button"] { transition: transform 0.08s ease, filter 0.12s ease, box-shadow 0.12s ease; }
  @media (hover: hover) { button:hover, [role="button"]:hover { filter: brightness(0.97); } }
  button:active, [role="button"]:active { transform: scale(0.975); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #c9ccd2;
    font-family: var(--sans);
    color: var(--ink);
    overflow: hidden;
  }
  #root {
    position: fixed; inset: 0;
    overflow: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .noscroll { scrollbar-width: none; }
  @keyframes ccFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes ccSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes ccScrim { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ccPushIn { from { transform: translateX(20px); } to { transform: none; } }
  @keyframes ccMenuIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  @keyframes ccPop { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes ccBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes ccTick { 0% { transform: translateY(4px); opacity: 0.4; } 100% { transform: none; opacity: 1; } }
  @keyframes ccCardIn { from { transform: translate(-50%,-46%) rotate(4deg) scale(0.9); opacity: 0; } to { transform: translate(-50%,-50%) rotate(-3deg) scale(1); opacity: 1; } }
  @keyframes ccShimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--line) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: ccShimmer 1.5s ease infinite;
    border-radius: 4px;
  }
  @keyframes ccStagger { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  @keyframes ccPushOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateX(-20px); } }
  @keyframes ccTabIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ccLift { from { transform: translateY(0); } to { transform: translateY(-3px); } }
  @keyframes ccPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  @keyframes ccCountUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes ccGlow { 0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.3); } 100% { box-shadow: 0 0 0 8px rgba(99,102,241,0); } }
  .stagger > * { animation: ccStagger 0.35s ease both; }
  .stagger > *:nth-child(1) { animation-delay: 0s; }
  .stagger > *:nth-child(2) { animation-delay: 0.04s; }
  .stagger > *:nth-child(3) { animation-delay: 0.08s; }
  .stagger > *:nth-child(4) { animation-delay: 0.12s; }
  .stagger > *:nth-child(5) { animation-delay: 0.16s; }
  .stagger > *:nth-child(6) { animation-delay: 0.20s; }
  .stagger > *:nth-child(7) { animation-delay: 0.24s; }
  .stagger > *:nth-child(8) { animation-delay: 0.28s; }
  .stagger > *:nth-child(9) { animation-delay: 0.32s; }
  .stagger > *:nth-child(10) { animation-delay: 0.36s; }
</style>
</head>
