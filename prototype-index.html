<style>
  :root {
    --bg: #eef0f3;
    --surface: #ffffff;
    --surface-2: #f6f7f9;
    --ink: #16181d;
    --ink-2: #3a3d44;
    --muted: #71757e;
    --faint: #a4a8b0;
    --line: #e7e8ec;
    --line-2: #eef0f3;
    --fill: #16181d;
    --glass: rgba(255,255,255,0.9);
    --ios-sb: #16181d;
    --accent: oklch(0.52 0.2 264);
    --accent-press: oklch(0.46 0.2 264);
    --accent-wash: oklch(0.95 0.04 264);
    --accent-ink: #ffffff;
    --up: oklch(0.58 0.13 152);
    --up-wash: oklch(0.95 0.05 152);
    --down: oklch(0.6 0.19 24);
    --gold: oklch(0.74 0.13 85);
    --sans: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'SF Mono', monospace;
    /* Radix-style scales */
    --radius-1: 5px; --radius-2: 8px; --radius-3: 11px; --radius-4: 14px; --radius-5: 18px;
    --shadow-1: 0 1px 2px rgba(20,24,40,0.06), 0 1px 3px rgba(20,24,40,0.05);
    --shadow-2: 0 2px 8px rgba(20,24,40,0.07), 0 4px 14px rgba(20,24,40,0.06);
    --shadow-3: 0 8px 26px rgba(20,24,40,0.13);
    --focus-ring: 0 0 0 3px color-mix(in oklch, var(--accent) 35%, transparent);
  }
  /* Radix-grade keyboard focus — visible only for keyboard users */
  :focus { outline: none; }
  button:focus-visible, a:focus-visible, input:focus-visible, [role="button"]:focus-visible, select:focus-visible {
    outline: none; box-shadow: var(--focus-ring); border-radius: 8px;
  }
  button, [role="button"] { transition: transform 0.08s ease, filter 0.12s ease, box-shadow 0.12s ease; }
  @media (hover: hover) { button:hover, [role="button"]:hover { filter: brightness(0.97); } }
  button:active, [role="button"]:active { transform: scale(0.975); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #c9ccd2;
    font-family: var(--sans);
    color: var(--ink);
    overflow: hidden;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 120% at 50% 0%, #d8dbe1 0%, #c2c5cc 60%, #b6b9c1 100%);
  }
  #device-scale { transform-origin: center center; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .noscroll { scrollbar-width: none; }
  @keyframes ccFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes ccSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes ccScrim { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ccPushIn { from { transform: translateX(20px); } to { transform: none; } }
  @keyframes ccMenuIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  @keyframes ccPop { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes ccBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes ccTick { 0% { transform: translateY(4px); opacity: 0.4; } 100% { transform: none; opacity: 1; } }
  @keyframes ccCardIn { from { transform: translate(-50%,-46%) rotate(4deg) scale(0.9); opacity: 0; } to { transform: translate(-50%,-50%) rotate(-3deg) scale(1); opacity: 1; } }
</style>

<script>
  function fitDevice() {
    var el = document.getElementById('device-scale');
    if (!el) return;
    var W = 402, H = 874;
    var s = Math.min((window.innerWidth - 24) / W, (window.innerHeight - 24) / H, 1);
    el.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fitDevice);
  fitDevice();
  window.__fitDevice = fitDevice;
</script>
